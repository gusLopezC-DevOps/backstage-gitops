apiVersion: apps/v1
kind: Deployment
metadata:
  name: backstage
  namespace: workloads
  labels:
    app: backstage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backstage
  template:
    metadata:
      labels:
        app: backstage
    spec:
      serviceAccountName: backstage
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done;']
      containers:
      - name: backstage
        image: docker.io/guslopezc/backstage:v3
        imagePullPolicy: Always
        ports:
        - containerPort: 7007
        env:
          - name: GITHUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: backstage-secrets
                key: GITHUB_TOKEN
          - name: AUTH_GITHUB_CLIENT_ID
            valueFrom:
              secretKeyRef:
                name: backstage-secrets
                key: AUTH_GITHUB_CLIENT_ID
          - name: AUTH_GITHUB_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: backstage-secrets
                key: AUTH_GITHUB_CLIENT_SECRET
          - name: POSTGRES_HOST
            value: postgres.workloads.svc.cluster.local
          - name: POSTGRES_USER
            valueFrom:
              secretKeyRef:
                name: postgres-sealed
                key: POSTGRES_USER
          - name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: postgres-sealed
                key: POSTGRES_PASSWORD
        readinessProbe:
          httpGet:
            path: /
            port: 7007
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 7007
          initialDelaySeconds: 60
          periodSeconds: 15
        resources:
          requests:
            memory: 512Mi
            cpu: 250m
          limits:
            memory: 1Gi
            cpu: 1000m
